<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dmitriy</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #060910;
      color: #eef5ef;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(900px, 94vw);
      text-align: center;
    }

    img {
      width: 100%;
      max-width: 850px;
      height: auto;
      display: block;
      margin: 0 auto 18px;
    }

    button {
      background: #0b1411;
      color: #eaf8ee;
      border: 1px solid #4f8f6a;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(80, 255, 150, 0.22);
    }

    button:hover {
      border-color: #8df5aa;
    }
  </style>
</head>
<body>
  <main>
    <img src="./assets/ribbon.gif" alt="AI-Integrated Apps Development">

    <button id="playButton">Play Music</button>

    <audio id="theme" src="./assets/theme.mp3" preload="auto"></audio>
  </main>

  <script>
    const button = document.getElementById("playButton");
    const audio = document.getElementById("theme");

    button.addEventListener("click", async () => {
      if (audio.paused) {
        await audio.play();
        button.textContent = "Pause Music";
      } else {
        audio.pause();
        button.textContent = "Play Music";
      }
    });
  </script>
</body>
</html>
